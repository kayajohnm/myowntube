<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>MyOwnTube Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f1f1f1;
            --text-secondary: #aaa;
            --accent-color: #ff0000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }
        h1 {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-align: center;
        }
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 6px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }
        .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }
    </style>
</head>
<body>

    <h1>My Tube Feed</h1>
    <div id="video-grid">Loading latest videos...</div>

    <script>
        // Your core channels array
        const channelIds = [
            'UC7ZpL9AMZ7_EAsCmsS6jS_A', // More Perfect Union
            'UCHTUAizKKQh07g5JXo_aiAA', // Respect Graduate School
            'UCDxiNlJ2t-4JUuoslZgOKgw', //Respect Turkce
            'UC1Gj8XdA6VnpgqZT2qarvvQ', //Friends of Respect.
            'UCT4EZVHHxIzYk8Xda3nhLQQ', //Hamdullah Ozturk
            'UCGFXgWH3U0LNVf9x8y72hAw', //Seyit Nurfethi Erkal
            'UCL8DzjUy5Mknf4iM3hrds-w', //Emine Eroglu
            'UCJS9pqu9BzkAMNTmIX_C_Yg', // Google Cloud Tech
            
        ];

        // Paste your secure Google Cloud API key here
        const API_KEY = 'YOUR_API_KEY_HERE';

        async function fetchLatestVideos() {
            const grid = document.getElementById('video-grid');
            let allVideos = [];

            for (const channelId of channelIds) {
                try {
                    // Step 1: Query Google to grab the dynamic, true Uploads Playlist ID
                    const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${API_KEY}`;
                    const channelResponse = await fetch(channelUrl);
                    const channelData = await channelResponse.json();

                    if (!channelData.items || channelData.items.length === 0) {
                        console.error(`Could not locate configuration details for: ${channelId}`);
                        continue;
                    }

                    // Extracts the precise playlist key assigned by YouTube
                    const uploadsPlaylistId = channelData.items[0].contentDetails.relatedPlaylists.uploads;

                    // Step 2: Grab the 5 latest items from that specific verified playlist container
                    const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=5&playlistId=${uploadsPlaylistId}&key=${API_KEY}`;
                    const playlistResponse = await fetch(playlistUrl);
                    const playlistData = await playlistResponse.json();

                    if (playlistData.items) {
                        playlistData.items.forEach(item => {
                            allVideos.push({
                                title: item.snippet.title,
                                videoId: item.snippet.resourceId.videoId,
                                channelTitle: item.snippet.channelTitle,
                                publishedAt: new Date(item.snippet.publishedAt)
                            });
                        });
                    }
                } catch (error) {
                    console.error("Network error mapping data strings:", error);
                }
            }

            // Unify, sort chronologically, and render
            allVideos.sort((a, b) => b.publishedAt - a.publishedAt);
            displayVideos(allVideos);
        }

        function displayVideos(videos) {
            const grid = document.getElementById('video-grid');
            
            if (videos.length === 0) {
                grid.innerHTML = '<div class="error-msg">No videos found. Check background console configurations.</div>';
                return;
            }

            grid.innerHTML = ''; 

            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube-nocookie.com/embed/${video.videoId}" 
                            referrerpolicy="strict-origin-when-cross-origin" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">${video.title}</p>
                        <p class="channel-title">${video.channelTitle}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        fetchLatestVideos();
    </script>
</body>
</html>
